name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, json, gd, zip, fileinfo
          coverage: none

      - name: Lint all PHP files (php -l)
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: Run unit tests
        run: php tests/run.php

      - name: Run manager tests (sandbox)
        run: php tests/managers.php

      - name: Run smoke tests (HTTP)
        run: bash tests/smoke.sh
